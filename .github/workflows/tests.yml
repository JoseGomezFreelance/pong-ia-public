name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pygame pytest pytest-cov certifi PyNaCl

      - name: Run tests with coverage
        run: python -m pytest --cov --cov-report=xml --cov-report=term -m "not slow"

      - name: Run benchmark tests
        run: python -m pytest tests/test_benchmark.py -v --tb=long

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false
